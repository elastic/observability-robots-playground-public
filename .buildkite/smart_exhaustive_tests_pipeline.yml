steps:
  - label: "Trigger observability-robots-playground-public-smart for PRs with .buildkite/scripts/smart.sh changes"
    if: build.pull_request.id != null && build.env("GITHUB_PR_TRIGGER_COMMENT") !~ /(?i)^run\s+exhaustive\s+tests/
    plugins:
      - monorepo-diff#v1.0.1:
          diff: "git diff --name-only origin/${BUILDKITE_PULL_REQUEST_BASE_BRANCH}...HEAD"
          interpolation: false
          watch:
            - path:
                - ^.buildkite/scripts/smart.sh
                - .buildkite/smart_exhaustive_tests_pipeline.yml
              config:
                trigger: "observability-robots-playground-public-smart"
                build:
                  commit: "${BUILDKITE_COMMIT}"
                  branch: "${BUILDKITE_BRANCH}"
                  env:
                    BUILDKITE_PULL_REQUEST: "${BUILDKITE_PULL_REQUEST}"
                    BUILDKITE_PULL_REQUEST_BASE_BRANCH: "${BUILDKITE_PULL_REQUEST_BASE_BRANCH}"
                    ELASTIC_SLACK_NOTIFICATIONS_ENABLED: false

  - label: "Trigger observability-robots-playground-public-smart for GitHub comments"
    if: build.env("GITHUB_PR_TRIGGER_COMMENT") =~ /(?i)^run\s+exhaustive\s+tests/
    trigger: "observability-robots-playground-public-smart"
    build:
      commit: "HEAD"
      branch: "pull/${BUILDKITE_PULL_REQUEST}/merge"
      env:
        BUILDKITE_PULL_REQUEST: "${BUILDKITE_PULL_REQUEST}"
        ELASTIC_SLACK_NOTIFICATIONS_ENABLED: false